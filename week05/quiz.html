<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">

</head>

<body>

    <h1>Basic HTML and CSS Quiz</h1>

    <form action="#" method="post">

        <!-- Q1: Text input -->
        <div>
            <label for="q1">1. What does CSS stand for?</label><br>
            <input type="text" id="q1" name="q1">
        </div>
        <br>

        <!-- Q2: Textarea -->
        <div>
            <label for="q2">2. How are id and class attributes selected in CSS?</label><br>
            <textarea id="q2" name="q2" rows="4" cols="40"></textarea>
        </div>
        <br>

        <!-- Q3: Select dropdown -->
        <div>
            <label for="q3">3. Which of the following is a valid CSS comment?</label><br>
            <select id="q3" name="q3">
                <option value="" selected disabled>Choose One ...</option>
                <option value="option1">/* comment */</option>
                <option value="option2">// comment</option>
                <option value="option3"><!-- comment --></option>
            </select>
        </div>
        <br>

        <!-- Q4: Number input -->
        <div>
            <label for="q4">4. What is the bottom margin given this declaration: margin: 10px 5px
                15px;</label><br>
            <input type="number" id="q4" name="q4">
        </div>
        <br>

        <!-- Submit button -->
        <button type="submit">Submit Quiz</button>

    </form>

</body>

</html>
