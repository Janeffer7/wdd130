<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Poll Form</title>

    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>
        <h1>WDD 130 | HTML FORM - User Poll</h1>
    </header>

    <main>
        <h2>Contact Information</h2>

        <form>

            <!-- Full Name -->
            <div class="form-item column2">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <!-- Email -->
            <div class="form-item column2">
                <label for="usermail">Email Address:</label>
                <input type="email" id="usermail" name="usermail" required>
            </div>

            <!-- Browser -->
            <div class="form-item column1">
                <label for="browser">What is your favorite browser?</label>
                <select name="browser" id="browser" required>
                    <option value="">Please choose an option</option>
                    <option value="chrome">Google Chrome</option>
                    <option value="firefox">Mozilla Firefox</option>
                    <option value="edge">Microsoft Edge</option>
                    <option value="opera">Opera</option>
                </select>
            </div>

            <!-- Pet -->
            <div class="form-item column1">
                <label for="pet">Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">
            </div>

            <!-- Places Lived -->
            <div class="form-item">
                <label for="feedback">List the places you have lived:</label><br>
                <textarea id="feedback" name="feedback" rows="5"
                  placeholder="Enter the places you have lived, separated by commas."></textarea>
            </div>

            <button type="submit">Submit Poll</button>

        </form>
    </main>

    <footer>
        <p>&copy; 2026 HTML Form - User Poll Activity | Janeffer Nzuki</p>
    </footer>

</body>

</html>
