<main>

    <!-- Company Info -->
    <section>
        <h2>Contact Information</h2>
        <p>Address: 123 River Road, Nairobi, Kenya</p>
        <p>Phone: +254 700 000 000</p>
        <p>Email: info@whitewaterrafting.com</p>

        <!-- Google Map -->
        <iframe src="YOUR_GOOGLE_MAP_EMBED_LINK_HERE"></iframe>
    </section>

    <!-- Employee Profiles -->
    <section>
        <h2>Our Team</h2>

        <figure>
            <img src="employee1.jpg" alt="Guide John Mwangi">
            <figcaption>John Mwangi - Senior Rafting Guide</figcaption>
        </figure>

        <figure>
            <img src="employee2.jpg" alt="Safety Officer Jane Doe">
            <figcaption>Jane Doe - Safety Officer</figcaption>
        </figure>

        <figure>
            <img src="employee3.jpg" alt="Customer Service Peter Kimani">
            <figcaption>Peter Kimani - Customer Service Manager</figcaption>
        </figure>
    </section>

    <!-- Contact Form -->
    <section>
        <h2>Send Us a Message</h2>

        <form>

            <!-- Name -->
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">

            <!-- Email -->
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">

            <!-- Purpose (Radio Buttons) -->
            <p>Purpose of Message:</p>

            <label>
                <input type="radio" name="purpose" value="general">
                General Inquiry
            </label>

            <label>
                <input type="radio" name="purpose" value="reservation">
                Reservation Question
            </label>

            <label>
                <input type="radio" name="purpose" value="suggestion">
                Website Suggestion
            </label>

            <!-- Message -->
            <label for="message">Message:</label>
            <textarea id="message" name="message"></textarea>

            <!-- Newsletter -->
            <label>
                <input type="checkbox" name="newsletter">
                Please subscribe me to the monthly newsletter
            </label>

            <!-- Submit Button -->
            <button type="submit">Send Message</button>

        </form>
    </section>

</main>
