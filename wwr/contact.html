<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
      content="Contact our white water rafting team for reservations, inquiries, or feedback. Find our address, phone number, email, and employee contacts.">

    <meta name="author" content="Janeffer Nzuki">

    <title>Contact Us | White Water Rafting</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.jpg" alt="White Water Rafting Logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <!-- Company Information -->
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p><strong>193-90101 Nairobi, Kenya</strong></p>
            <p><strong>+254 700 000 000</strong></p>
            <p><strong>info@whitewaterrafting.com</strong></p>
        </section>

        <!-- Map and Contact Form -->
        <div class="contact-layout">

            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d31908.192078781616!2d37.4355676!3d-1.4594595000000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2ske!4v1781266937541!5m2!1sen!2ske"
                  allowfullscreen="" loading="lazy">
                </iframe>
            </div>

            <section class="contact-form-section">
                <h2>Send Us a Message</h2>

                <form>
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>

                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>

                    <p><strong>Purpose of Message</strong></p>

                    <label><input type="radio" name="purpose" value="general" required> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website
                        Suggestion</label>

                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5"></textarea>

                    <label>
                        <input type="checkbox" name="newsletter">
                        Please subscribe me to the monthly newsletter
                    </label>

                    <button type="submit">Get in Touch!</button>
                </form>
            </section>

        </div>

        <!-- Employee Profiles -->
        <section class="employees">

            <h2>We Are Here to Serve You</h2>

            <!-- ✅ NEW DIV CLASS ADDED HERE -->
            <div class="employee-container">

                <div class="employee-profiles">

                    <figure>
                        <img src="images/employee1.jpg" alt="Sue Dior - Senior Guide">
                        <figcaption>Sue Dior - Senior Rafting Guide</figcaption>
                    </figure>

                    <figure>
                        <img src="images/employee2.jpg" alt="Jane John - Safety Officer">
                        <figcaption>Jane John - Safety Officer</figcaption>
                    </figure>

                    <figure>
                        <img src="images/employee3.jpg"
                          alt="Faith James - Customer Service Manager">
                        <figcaption>Faith James - Customer Service Manager</figcaption>
                    </figure>

                </div>

            </div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting. All rights reserved.</p>

        <div class="socialmedia">
            <a href="#"><img src="images/facebook.jpg" alt="Facebook"></a>
            <a href="#"><img src="images/instagram.jpg" alt="Instagram"></a>
            <a href="#"><img src="images/linkedin.jpg" alt="LinkedIn"></a>
        </div>
    </footer>

</body>

</html>
